<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI NotebookLM Runtime Lab Portal</title>
  <meta name="description" content="AI NotebookLM Local-First Runtime Portal">
  
  <!-- Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, hsl(220, 25%, 10%) 0%, hsl(220, 30%, 5%) 100%);
      --accent-color: hsl(160, 80%, 40%);
      --accent-glow: hsla(160, 80%, 40%, 0.15);
      --text-main: hsl(210, 20%, 98%);
      --text-muted: hsl(210, 10%, 70%);
      --card-bg: hsla(220, 20%, 15%, 0.6);
      --card-border: hsla(220, 20%, 25%, 0.5);
      --glass-glow: hsla(0, 0%, 100%, 0.03);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Subtle background glow effect */
    body::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--accent-glow);
      border-radius: 50%;
      filter: blur(100px);
      top: 10%;
      left: 15%;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: hsla(260, 80%, 50%, 0.08);
      border-radius: 50%;
      filter: blur(80px);
      bottom: 10%;
      right: 15%;
      z-index: 0;
      pointer-events: none;
    }

    main {
      width: 100%;
      max-width: 800px;
      padding: 24px;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .portal-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 48px 32px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 1px var(--glass-glow);
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      background: linear-gradient(to right, #ffffff, var(--accent-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      font-size: 1.15rem;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 600px;
      margin: 0 auto 36px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: hsla(160, 80%, 40%, 0.1);
      border: 1px solid hsla(160, 80%, 40%, 0.2);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent-color);
      margin-bottom: 24px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: var(--accent-color);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-color);
      animation: pulse 1.5s infinite;
    }

    .links-container {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 12px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-primary {
      background: var(--accent-color);
      color: hsl(220, 30%, 5%);
      box-shadow: 0 4px 12px hsla(160, 80%, 40%, 0.25);
    }

    .btn-primary:hover {
      background: hsl(160, 80%, 45%);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px hsla(160, 80%, 40%, 0.4);
    }

    .btn-secondary {
      background: hsla(220, 10%, 25%, 0.4);
      color: var(--text-main);
      border: 1px solid var(--card-border);
    }

    .btn-secondary:hover {
      background: hsla(220, 10%, 25%, 0.7);
      transform: translateY(-2px);
    }

    footer {
      margin-top: 48px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    footer a {
      color: var(--accent-color);
      text-decoration: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(0.9);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.15);
        opacity: 1;
      }
      100% {
        transform: scale(0.9);
        opacity: 0.6;
      }
    }
  </style>
</head>
<body>

<main>
  <div class="portal-card">
    <div class="status-badge">
      <span class="status-dot"></span>
      準備就緒：等待步驟指令
    </div>
    <h1>AI NotebookLM Portal</h1>
    <p class="subtitle">原本的完整平台內容已備份至 <a href="index-old.html" style="color: var(--accent-color); text-decoration: underline;">index-old.html</a>。我們將在此首頁按照您的指示，一步一步進行全新功能的建置與內容調整。</p>
    
    <div class="links-container">
      <a href="index-old.html" class="btn btn-secondary">瀏覽舊版備份 (index-old.html)</a>
    </div>
  </div>
</main>

<footer>
  AI NotebookLM Runtime Lab &copy; 2026. Made with pride.
</footer>

</body>
</html>
